<!DOCTYPE html>


<html lang="zh-CN">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">


    <meta name="theme-color" content="#667eea">


    <meta name="mobile-web-app-capable" content="yes">


    <meta name="apple-mobile-web-app-capable" content="yes">


    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">


    <link rel="manifest" href="manifest.json">


    <title>🎯 单词消消乐 - 人教版7-9年级</title>


    <style>


        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');





        * { margin: 0; padding: 0; box-sizing: border-box; }





        :root {


            --primary: #FF6B9D;


            --secondary: #C44CFF;


            --accent: #00D4FF;


            --success: #4AE54A;


            --warning: #FFD93D;


            --bg-dark: #1A1B2E;


            --bg-card: #2D2F4A;


            --text-light: #F8F9FF;


            --text-muted: #A8AAC4;


        }





        body {


            font-family: 'Nunito', sans-serif;


            background: linear-gradient(135deg, #1A1B2E 0%, #2D2F4A 50%, #1A1B2E 100%);


            height: 100vh; overflow: hidden;


            display: flex; flex-direction: column;


            color: var(--text-light);


        }





        /* 动态背景 */


        .bg-animation {


            position: fixed; top: 0; left: 0; width: 100%; height: 100%;


            pointer-events: none; z-index: 0; overflow: hidden;


        }


        .floating-shape {


            position: absolute; border-radius: 50%; opacity: 0.1;


            animation: float 20s infinite ease-in-out;


        }


        .shape1 { width: 300px; height: 300px; background: var(--primary); top: 10%; left: -5%; }


        .shape2 { width: 200px; height: 200px; background: var(--accent); top: 60%; right: -3%; animation-delay: -5s; }


        .shape3 { width: 250px; height: 250px; background: var(--secondary); bottom: -5%; left: 30%; animation-delay: -10s; }


        @keyframes float {


            0%, 100% { transform: translate(0, 0) rotate(0deg); }


            25% { transform: translate(50px, 50px) rotate(90deg); }


            50% { transform: translate(0, 100px) rotate(180deg); }


            75% { transform: translate(-50px, 50px) rotate(270deg); }


        }





        /* 音效/语音开关 */


        .sound-control {


            position: fixed; top: 10px; right: 10px; z-index: 200;


            display: flex; gap: 6px;


        }


        .sound-btn {


            background: rgba(45, 47, 74, 0.9); border: 2px solid rgba(255, 255, 255, 0.2);


            color: var(--text-light); width: 38px; height: 38px; border-radius: 50%;


            cursor: pointer; font-size: 1.1rem; display: flex; align-items: center;


            justify-content: center; transition: all 0.3s;


        }


        .sound-btn:hover { transform: scale(1.1); border-color: var(--accent); }


        .sound-btn.muted { opacity: 0.5; }





        /* 音波动画 */


        .sound-wave {


            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);


            display: flex; gap: 3px; z-index: 100; opacity: 0; transition: opacity 0.3s;


        }


        .sound-wave.active { opacity: 1; }


        .wave-bar {


            width: 3px; height: 18px; background: var(--accent); border-radius: 2px;


            animation: wave 0.5s ease-in-out infinite;


        }


        .wave-bar:nth-child(1) { animation-delay: 0s; }


        .wave-bar:nth-child(2) { animation-delay: 0.1s; }


        .wave-bar:nth-child(3) { animation-delay: 0.2s; }


        .wave-bar:nth-child(4) { animation-delay: 0.3s; }


        .wave-bar:nth-child(5) { animation-delay: 0.4s; }


        @keyframes wave {


            0%, 100% { height: 8px; }


            50% { height: 25px; }


        }





        /* 主容器 - 全屏 flex 布局 */


        .container {


            position: relative; z-index: 1; max-width: 1200px;


            margin: 0 auto; padding: 4px 6px 6px;


            width: 100%; height: 100vh;


            display: flex; flex-direction: column;


        }





        /* 头部 - 极小 */


        .header {


            text-align: center; padding: 6px 0 2px;


            animation: slideDown 0.6s ease-out;


        }


        @keyframes slideDown {


            from { opacity: 0; transform: translateY(-20px); }


            to { opacity: 1; transform: translateY(0); }


        }


        .title {


            font-family: 'Fredoka One', cursive;


            font-size: 1.4rem;


            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));


            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;


            margin-bottom: 1px; letter-spacing: 1px;


        }


        .brand { color: var(--text-muted); font-size: 0.6rem; font-weight: 600; }





        /* 统计面板 - 5列极紧凑（占1/3） */


        .stats-panel {


            display: grid; grid-template-columns: repeat(5, 1fr);


            gap: 3px; margin: 3px 0;


            animation: fadeIn 0.6s ease-out 0.1s both;


        }


        @keyframes fadeIn {


            from { opacity: 0; transform: translateY(15px); }


            to { opacity: 1; transform: translateY(0); }


        }


        .stat-card {


            background: linear-gradient(135deg, var(--bg-card), rgba(45, 47, 74, 0.8));


            border-radius: 8px; padding: 4px 2px;


            text-align: center; border: 1px solid transparent;


            transition: all 0.3s; position: relative; overflow: hidden;


        }


        .stat-card::before {


            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;


            background: linear-gradient(90deg, var(--primary), var(--secondary));


        }


        .stat-card:hover { transform: translateY(-1px); border-color: var(--primary); }


        .stat-icon { font-size: 0.7rem; margin-bottom: 0; }


        .stat-value { font-size: 0.7rem; font-weight: 900; color: var(--accent); line-height: 1; }


        .stat-label { color: var(--text-muted); font-size: 0.45rem; font-weight: 600; margin-top: 0; }





        /* 游戏区域 - 占据剩余2/3空间 */


        .game-area {


            background: linear-gradient(135deg, rgba(45, 47, 74, 0.9), rgba(26, 27, 46, 0.9));


            border-radius: 16px; padding: 8px;


            margin: 3px 0 0; border: 2px solid rgba(255, 107, 157, 0.2);


            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);


            animation: fadeIn 0.6s ease-out 0.2s both;


            flex: 1; display: flex; flex-direction: column;


            overflow: hidden; min-height: 0;


        }





        /* 游戏头部 - 极紧凑（缩小到1/2） */


        .game-header {


            display: flex; justify-content: space-between; align-items: center;


            margin-bottom: 4px; gap: 3px;


        }





        .selector-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }


        .grade-selector, .semester-selector { display: flex; gap: 2px; }


        .grade-btn, .semester-btn {


            background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1);


            color: #aaa; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem;


            cursor: pointer; transition: all 0.2s;


        }


        .grade-btn.active, .semester-btn.active {


            border-color: var(--primary); color: #fff;


            background: linear-gradient(135deg, rgba(255,107,157,0.2), var(--bg-card));


        }





        .unit-selector { display: flex; gap: 2px; flex-wrap: wrap; }


        .unit-btn {


            background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.1);


            color: var(--text-light); padding: 2px 5px; font-size: 0.65rem;


            border-radius: 6px; cursor: pointer; font-family: 'Nunito', sans-serif;


            font-weight: 700; transition: all 0.3s;


        }


        .unit-btn:hover { border-color: var(--accent); transform: translateY(-1px); }


        .unit-btn.active {


            background: linear-gradient(135deg, var(--primary), var(--secondary));


            border-color: transparent; box-shadow: 0 2px 8px rgba(255, 107, 157, 0.4);


        }


        .new-game-btn {


            background: linear-gradient(135deg, var(--success), #2DBF2D);


            border: none; color: white; padding: 4px 8px; border-radius: 6px;


            cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700;


            font-size: 0.7rem; transition: all 0.3s;


            display: flex; align-items: center; gap: 3px; white-space: nowrap;


        }


        .new-game-btn:hover {


            transform: translateY(-1px); box-shadow: 0 3px 10px rgba(74, 229, 74, 0.4);


        }





        /* 提示区域 - 极小（缩小到1/2） */


        .hint-area {


            background: linear-gradient(135deg, rgba(255, 217, 61, 0.1), rgba(255, 107, 157, 0.1));


            border-radius: 6px; padding: 3px 6px; margin-bottom: 4px;


            text-align: center; border: 1px dashed rgba(255, 217, 61, 0.3);


        }


        .hint-text { font-size: 0.7rem; color: var(--warning); font-weight: 700; }





        /* 单词网格 - 占满剩余空间 */


        .word-grid {


            display: grid;


            grid-template-columns: repeat(5, 1fr);


            gap: 5px;


            flex: 1; overflow-y: auto;


            align-content: start;


            transition: opacity 0.3s;


        }


        .word-grid.timer-ended {


            pointer-events: none;


            opacity: 0.4;


        }


        .word-card {


            background: linear-gradient(135deg, var(--bg-card), rgba(45, 47, 74, 0.6));


            border-radius: 12px; padding: 8px 4px;


            text-align: center; cursor: pointer;


            border: 2px solid transparent;


            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);


            position: relative; overflow: hidden;


            display: flex; flex-direction: column;


            justify-content: center; align-items: center;


        }


        .word-card::before {


            content: ''; position: absolute; top: -50%; left: -50%;


            width: 200%; height: 200%;


            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);


            opacity: 0; transition: opacity 0.3s;


        }


        .word-card:hover::before { opacity: 1; }


        .word-card:hover {


            transform: translateY(-4px) scale(1.02);


            border-color: var(--accent);


            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.25);


        }


        .word-card.selected {


            border-color: var(--primary);


            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), var(--bg-card));


            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);


            animation: pulse 0.4s ease;


        }


        @keyframes pulse {


            0%, 100% { transform: scale(1); }


            50% { transform: scale(1.05); }


        }


        .word-card.matched {


            background: linear-gradient(135deg, rgba(74, 229, 74, 0.3), var(--bg-card));


            border-color: var(--success);


            animation: matchSuccess 0.5s ease;


        }


        @keyframes matchSuccess {


            0% { transform: scale(1); }


            30% { transform: scale(1.12) rotate(4deg); }


            60% { transform: scale(1.06) rotate(-4deg); }


            100% { transform: scale(1) rotate(0deg); }


        }


        .word-card.wrong {


            animation: shake 0.4s ease; border-color: #FF4757;


        }


        @keyframes shake {


            0%, 100% { transform: translateX(0); }


            20% { transform: translateX(-6px); }


            40% { transform: translateX(6px); }


            60% { transform: translateX(-6px); }


            80% { transform: translateX(6px); }


        }


        .word-card.hidden {


            opacity: 0; transform: scale(0);


            pointer-events: none;


        }


        .word-text {


            font-size: 0.88rem; font-weight: 800; color: var(--text-light);


            margin-bottom: 2px; position: relative; z-index: 1;


            line-height: 1.2; word-break: break-all;


        }


        .word-type {


            font-size: 0.6rem; color: var(--text-muted); font-weight: 600;


            position: relative; z-index: 1;


        }


        .speak-icon {


            position: absolute; top: 4px; right: 4px;


            font-size: 0.72rem; opacity: 0.4; transition: all 0.3s;


        }


        .word-card:hover .speak-icon {


            opacity: 1;


            animation: bounce 0.5s ease infinite;


        }


        @keyframes bounce {


            0%, 100% { transform: translateY(0); }


            50% { transform: translateY(-3px); }


        }





        /* 进度条 - 极小 */


        .progress-bar {


            width: 100%; height: 3px; background: var(--bg-card);


            border-radius: 3px; margin-top: 4px; overflow: hidden; flex-shrink: 0;


        }


        .progress-fill {


            height: 100%;


            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));


            border-radius: 6px; transition: width 0.4s ease;


            box-shadow: 0 0 12px rgba(255, 107, 157, 0.5);


        }





        /* 星星特效 */


        .star {


            position: fixed; pointer-events: none; z-index: 999;


            animation: starFloat 1s ease-out forwards;


        }


        @keyframes starFloat {


            0% { opacity: 1; transform: scale(0) rotate(0deg); }


            50% { opacity: 1; transform: scale(1) rotate(180deg); }


            100% { opacity: 0; transform: scale(0.5) rotate(360deg) translateY(-70px); }


        }





        /* 连击提示 */


        .combo {


            position: fixed; top: 15%; right: 4%;


            background: linear-gradient(135deg, var(--warning), #FFA502);


            padding: 10px 20px; border-radius: 15px;


            font-size: 1.1rem; font-weight: 900; color: white;


            z-index: 999; animation: comboIn 0.3s ease;


            box-shadow: 0 6px 20px rgba(255, 217, 61, 0.5);


        }


        @keyframes comboIn {


            from { transform: scale(0) rotate(-10deg); }


            to { transform: scale(1) rotate(0deg); }


        }





        /* 鼓励消息 */


        .encouragement {


            position: fixed; top: 50%; left: 50%;


            transform: translate(-50%, -50%);


            background: linear-gradient(135deg, var(--primary), var(--secondary));


            padding: 20px 30px; border-radius: 20px;


            font-size: 1.4rem; font-weight: 900; color: white;


            z-index: 1000; box-shadow: 0 18px 50px rgba(255, 107, 157, 0.5);


            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);


            pointer-events: none; text-align: center;


        }


        @keyframes popIn {


            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }


            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }


        }





        /* ========== 手机端强制覆盖 ========== */


        @media (max-width: 768px) {


            .container { padding: 8px 6px 15px; }


            .title { font-size: 1.6rem; }


            .brand { font-size: 0.72rem; }


            .header { padding: 8px 0 3px; }





            /* 统计面板 - 极小 */


            .stats-panel {


                grid-template-columns: repeat(3, 1fr) !important;


                gap: 4px !important;


                margin: 6px 0 !important;


            }


            .stat-card { padding: 5px 2px !important; border-radius: 10px !important; }


            .stat-icon { font-size: 1rem !important; margin-bottom: 0; }


            .stat-value { font-size: 1.05rem !important; }


            .stat-label { font-size: 0.55rem !important; margin-top: 0 !important; }





            /* 游戏区域 */


            .game-area { padding: 10px !important; border-radius: 15px !important; margin: 6px 0 !important; }


            .game-header { margin-bottom: 6px !important; gap: 5px !important; flex-wrap: wrap !important; }





            /* 单元按钮 */


            .unit-selector { gap: 3px !important; }


            .unit-btn {


                padding: 4px 7px !important;


                font-size: 0.68rem !important;


                border-radius: 8px !important;


            }





            /* 新游戏按钮 */


            .new-game-btn { padding: 6px 12px !important; font-size: 0.78rem !important; border-radius: 8px !important; }


            #testVoiceBtn { padding: 5px 10px !important; font-size: 0.72rem !important; }





            /* 单词网格 - 手机5列 */


            .word-grid {


                grid-template-columns: repeat(5, 1fr) !important;


                gap: 4px !important;


            }


            .word-card {


                padding: 6px 2px !important;


                border-radius: 8px !important;


                border-width: 1px !important;


            }


            .word-text { font-size: 0.78rem !important; margin-bottom: 1px !important; }


            .word-type { font-size: 0.52rem !important; }


            .speak-icon { font-size: 0.65rem !important; top: 2px !important; right: 2px !important; }





            /* 提示 */


            .hint-area { padding: 5px 8px !important; margin-bottom: 6px !important; border-radius: 8px !important; }


            .hint-text { font-size: 0.8rem !important; }





            /* 进度条 */


            .progress-bar { margin-top: 8px !important; height: 4px !important; }





            /* 鼓励/连击 */


            .encouragement { padding: 15px 24px !important; font-size: 1.1rem !important; border-radius: 15px !important; }


            .combo { padding: 7px 14px !important; font-size: 0.9rem !important; top: 12% !important; }





            /* 音效按钮 */


            .sound-btn { width: 34px !important; height: 34px !important; font-size: 0.95rem !important; }


            .sound-control { top: 6px !important; right: 6px !important; gap: 4px !important; }


        }





        @media (max-width: 380px) {


            .word-grid { grid-template-columns: repeat(4, 1fr) !important; }


            .word-card { padding: 4px 2px !important; }


            .word-text { font-size: 0.72rem !important; }


            .stat-value { font-size: 0.6rem !important; }


            .stat-label { font-size: 0.4rem !important; }


        }


    </style>


<body>


    <!-- 动态背景 -->


    <div class="bg-animation">


        <div class="floating-shape shape1"></div>


        <div class="floating-shape shape2"></div>


        <div class="floating-shape shape3"></div>


    </div>





    <!-- 音效/语音控制 -->


    <div class="sound-control">


        <button class="sound-btn" id="soundToggle" title="音效">🔊</button>


        <button class="sound-btn" id="voiceToggle" title="语音">🗣️</button>


    </div>





    <!-- 音波动画 -->


    <div class="sound-wave" id="soundWave">


        <div class="wave-bar"></div>


        <div class="wave-bar"></div>


        <div class="wave-bar"></div>


        <div class="wave-bar"></div>


        <div class="wave-bar"></div>


    </div>





    <!-- 初始化遮罩（手机必须先点击才能激活音频） -->


    <div id="initOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;cursor:pointer;background:rgba(26,27,46,0.97);">


        <div style="font-size:3.5rem;">🎯</div>


        <div style="font-size:1.6rem;font-weight:900;color:white;">单词消消乐</div>


        <div style="color:#A8AAC4;font-size:0.95rem;line-height:1.6;text-align:center;">


            点击屏幕任意位置开始<br>


            <span style="font-size:0.8rem;color:#666">（激活音效和语音朗读）</span>


        </div>


        <div style="color:#555;font-size:0.8rem;">万嘉教育 | 周老师</div>


    </div>





    <div class="container">


        <!-- 头部 -->


        <div class="header">


            <h1 class="title">🎯 单词消消乐</h1>


            <p class="brand">万嘉教育 | 周老师</p>


        </div>





        <!-- 统计面板（去掉连击） -->


        <div class="stats-panel">


            <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-value" id="score">0</div><div class="stat-label">得分</div></div>


            <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" id="correct">0</div><div class="stat-label">正确</div></div>


            <div class="stat-card"><div class="stat-icon">❌</div><div class="stat-value" id="wrong">0</div><div class="stat-label">错误</div></div>


            <div class="stat-card"><div class="stat-icon">🔗</div><div class="stat-value" id="matched">0</div><div class="stat-label">已配对</div></div>


            <div class="stat-card" id="resetCard" style="cursor:pointer" title="清零积分"><div class="stat-icon">🗑️</div><div class="stat-value" style="font-size:0.6rem">清零</div></div>


            <div class="stat-card" id="timerCard"><div class="stat-icon">⏱️</div><div class="stat-value" id="timerDisplay">--:--</div><div class="stat-label">计时</div></div>


        </div>





        <!-- 游戏区域 -->


        <div class="game-area">


            <div class="game-header">


                <div class="selector-row">


                    <div class="grade-selector">


                        <button class="grade-btn active" data-grade="7">七年级</button>


                        <button class="grade-btn" data-grade="8">八年级</button>


                        <button class="grade-btn" data-grade="9">九年级</button>


                    </div>


                    <div class="semester-selector">


                        <button class="semester-btn active" data-semester="上">上册</button>


                        <button class="semester-btn" data-semester="下">下册</button>


                    </div>


                </div>


                <div class="unit-selector" id="unitSelector">


                    <!-- 动态生成 -->


                </div>


                <button class="new-game-btn" id="newGameBtn">


                    <span>🎮</span> 新游戏


                </button>

        class SoundSystem {


            constructor() {


                this.audioCtx = null;


                this.soundEnabled = true;


                this.voiceEnabled = true;


                this.ready = false;


                this.lastSpeakTime = 0; // 防抖


            }





            init() {


                if (!this.audioCtx) {


                    try {


                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();


                    } catch(e) { return; }


                }


                // 强制 resume，兼容所有浏览器


                if (this.audioCtx.state === 'suspended' || this.audioCtx.state === 'interrupted') {


                    this.audioCtx.resume().catch(() => {});


                }


                // 播放一个静音音频来真正激活 AudioContext（Safari/Edge 需要）


                try {


                    const ctx = this.audioCtx;


                    const o = ctx.createOscillator();


                    const g = ctx.createGain();


                    o.connect(g);


                    g.connect(ctx.destination);


                    g.gain.setValueAtTime(0.001, ctx.currentTime); // 静音


                    o.start(ctx.currentTime);


                    o.stop(ctx.currentTime + 0.001);


                } catch(e) {}


                this.ready = true;


            }





            playSound(type) {


                if (!this.soundEnabled || !this.audioCtx) return;


                if (this.audioCtx.state === 'suspended') {


                    this.audioCtx.resume().catch(() => {});


                }


                try {


                    const ctx = this.audioCtx, now = ctx.currentTime;


                    switch(type) {


                        case 'click': this._beep(ctx, now, 800, 0.1); break;


                        case 'select': this._beep(ctx, now, 600, 0.12); break;


                        case 'match': this._beep(ctx, now, 800, 0.15); break;


                        case 'wrong': this._beep(ctx, now, 200, 0.2); break;


                        case 'combo': this._beep(ctx, now, 1000, 0.1); break;


                        case 'victory': this._beep(ctx, now, 523, 0.3); break;


                    }


                } catch(e) { console.warn('playSound error:', e); }


            }





            // 简化为单音效，减少节点创建


            _beep(ctx, now, freq, duration) {


                const o = ctx.createOscillator();


                const g = ctx.createGain();


                o.connect(g);


                g.connect(ctx.destination);


                o.frequency.value = freq;


                g.gain.setValueAtTime(0.1, now);


                g.gain.exponentialRampToValueAtTime(0.001, now + duration);


                o.start(now);


                o.stop(now + duration + 0.05);


            }





            // ============ 语音朗读（防崩溃优化版） ============


            speak(text, lang) {

                const now = Date.now();


                if (now - this.lastSpeakTime < 300) return;

                const wave = document.getElementById('soundWave');


                wave.classList.add('active');





                // 先取消之前的语音，防止堆积


                try { speechSynthesis.cancel(); } catch(e) {}





                // 选择最佳语音

                const best = lang === 'zh-CN'


                    ? (voices.find(v => /zh/i.test(v.lang)) || voices[0])

                u.lang = lang;


                u.rate = lang === 'zh-CN' ? 0.9 : 0.85;


                u.pitch = 1;


                if (best) u.voice = best;


                u.onend = () => wave.classList.remove('active');


                u.onerror = () => wave.classList.remove('active');





                // 超时保护：1秒后强制移除动画


                setTimeout(() => wave.classList.remove('active'), 1000);





                try { speechSynthesis.speak(u); } catch(e) { 


                    console.warn('speak error:', e);


                    wave.classList.remove('active');


                }


            }

        // ============ 计时系统 ============


        function startTimer(seconds) {


            stopTimer();


            G.timerSeconds = seconds;


            G.timerRunning = true;


            G.timerEnded = false;


            G.score = 0; G.correct = 0; G.wrong = 0;


            G.combo = 0; G.matchedPairs = 0;


            document.getElementById('wordGrid').classList.remove('timer-ended');


            startGame();


            updateStats();


            G.timerInterval = setInterval(() => {


                G.timerSeconds--;


                updateTimerDisplay();


                if (G.timerSeconds <= 0) {


                    endTimer();


                }


            }, 1000);


            updateTimerDisplay();


        }





        function stopTimer() {


            if (G.timerInterval) { clearInterval(G.timerInterval); G.timerInterval = null; }


            G.timerRunning = false;


            document.getElementById('timerDisplay').textContent = '--:--';


        }





        function updateTimerDisplay() {


            const m = Math.floor(G.timerSeconds / 60);


            const s = G.timerSeconds % 60;


            document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2, '0')}`;


        }





        function endTimer() {


            stopTimer();


            G.timerEnded = true;


            document.getElementById('wordGrid').classList.add('timer-ended');

                if (sem[key] && sem[key].length > 0) {


                    const label = key.startsWith('S') ? key : 'U' + key;


                    html += '<button class="unit-btn" data-unit="' + key + '">' + label + '</button>';


                }


            }


            sel.innerHTML = html;


            // 绑定点击


            sel.querySelectorAll('.unit-btn').forEach(btn => {


                btn.addEventListener('click', () => {


                    if (G.timerEnded) return;


                    sound.init();


                    sound.playSound('click');


                    sel.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));


                    btn.classList.add('active');


                    G.currentUnit = btn.dataset.unit;


                    startGame();


                });


            });


        }





        function startGame() {


            sound.init();


            sound.playSound('click');





            G.selectedCard = null;


            // score 不清零，保留累计分数


            G.correct = 0; G.wrong = 0;


            G.combo = 0; G.maxCombo = 0; G.matchedPairs = 0;


            G.matchedSet = new Set();   // 本轮已配对词集合





            // 收集当前单元全部词（整个单元所有词，不只10个）


            let allWords = [];


            const semData = wordData[G.currentGrade][G.currentSemester];


            if (G.currentUnit === 'all') {


                for (let u in semData) allWords = allWords.concat(semData[u]);


            } else {


                allWords = [...(semData[G.currentUnit] || [])];


            }





            // 构建带权重的词池（错题权重更高，会多次出现）


            let pool = [];


            allWords.forEach(w => {


                const weight = 1 + (G.wrongWords.get(w.en) || 0);


                for (let i = 0; i < weight; i++) pool.push(w);


            });





            // 随机打乱整个池


            for (let i = pool.length - 1; i > 0; i--) {


                const j = Math.floor(Math.random() * (i + 1));


                [pool[i], pool[j]] = [pool[j], pool[i]];


            }





            // 【关键修改】remainingWords 存储整个单元的所有词，不只10个


            // 使用 Map 去重但保留权重顺序


            let seen = new Set();


            G.remainingWords = [];


            for (const w of pool) {


                if (!seen.has(w.en)) {


                    seen.add(w.en);


                    G.remainingWords.push(w);


                }


            }





            // 取前10个作为第一轮


            const chosen = G.remainingWords.slice(0, 10);


            G.currentWords = chosen;


            G.totalPairs = chosen.length;





            renderCards(chosen);


            updateStats();


        }





        // 下一轮：从剩余词库取新10个（去掉本轮已配对的词）


        function nextRound() {


            if (G.timerEnded) return;


            


            // 清理选中状态


            G.selectedCard = null;


            


            // 取消所有正在进行的语音


            try { speechSynthesis.cancel(); } catch(e) {}


            


            // 从剩余词中去掉本轮已配对的词


            G.remainingWords = G.remainingWords.filter(w => !G.matchedSet.has(w.en));





            if (G.remainingWords.length === 0) {


                // 词库用完，通关！


                sound.playSound('victory');


                showVictory();


                return;


            }





            // 取下一批10个词（确保不超过剩余数量）


            const take = Math.min(10, G.remainingWords.length);


            const chosen = G.remainingWords.slice(0, take);


            G.currentWords = chosen;


            G.totalPairs = chosen.length;


            G.matchedSet = new Set();


            G.correct = 0; G.wrong = 0;


            G.combo = 0; G.matchedPairs = 0;





            // 使用 requestAnimationFrame 确保 DOM 更新


            requestAnimationFrame(() => {


                renderCards(chosen);


                updateStats();


            });


        }





        function renderCards(words) {


            const grid = document.getElementById('wordGrid');


            


            // 清空网格（innerHTML 会自动移除事件监听器）


            grid.innerHTML = '';





            let cards = [];


            words.forEach((w, i) => {


                cards.push({text: w.en, type: 'en', pairId: i, word: w});


                cards.push({text: w.cn, type: 'cn', pairId: i, word: w});


            });





            // Fisher-Yates 洗牌


            for (let i = cards.length - 1; i > 0; i--) {


                const j = Math.floor(Math.random() * (i + 1));


                [cards[i], cards[j]] = [cards[j], cards[i]];


            }





            // 使用 DocumentFragment 减少重排


            const fragment = document.createDocumentFragment();


            cards.forEach((card, idx) => {


                const el = document.createElement('div');


                el.className = 'word-card';


                el.dataset.type = card.type;


                el.dataset.pairId = card.pairId;


                el.dataset.text = card.text;


                el.innerHTML = `


                    <div class="speak-icon">🔊</div>


                    <div class="word-text">${card.text}</div>


                    <div class="word-type">${card.type === 'en' ? '英文' : '中文'}</div>


                `;


                el.addEventListener('click', () => onCardClick(el));


                el.style.animation = `fadeIn 0.4s ease ${idx * 0.03}s both`;


                fragment.appendChild(el);


            });


            grid.appendChild(fragment);


        }





        function onCardClick(card) {


            if (G.timerEnded) return;


            if (card.classList.contains('matched') || card.classList.contains('hidden')) return;





            sound.init();


            const text = card.dataset.text;


            const lang = card.dataset.type === 'en' ? 'en-US' : 'zh-CN';





            // 点击卡片立即朗读（手机友好：init 确保 audio 已激活）


            sound.speak(text, lang);





            if (!G.selectedCard) {


                sound.playSound('select');


                G.selectedCard = card;


                card.classList.add('selected');


                setHint(`已选"${text}"，选对应的${card.dataset.type === 'en' ? '中文' : '英文'}！`);


            } else if (G.selectedCard === card) {


                card.classList.remove('selected');


                G.selectedCard = null;


                setHint('点击英文单词，再点击对应的中文意思进行配对！');


            } else {


                const first = G.selectedCard;


                const second = card;


                if (first.dataset.pairId === second.dataset.pairId &&


                    first.dataset.type !== second.dataset.type) {


                    onMatch(first, second);


                } else {


                    onMismatch(first, second);


                }


            }


        }





        function onMatch(first, second) {


            sound.playSound('match');


            first.classList.remove('selected');


            first.classList.add('matched');


            second.classList.add('matched');


            G.selectedCard = null;


            G.correct++;


            G.combo++;


            G.matchedPairs++;


            G.score += 1; // 简化：做对+1分，无连击加成





            setHint(encouragements[Math.floor(Math.random() * encouragements.length)]);


            spawnStars(first);


            spawnStars(second);





            if (G.combo >= 2) {


                sound.playSound('combo');


                const el = document.createElement('div');


                el.className = 'combo';


                el.textContent = `🔥 ${G.combo}连击！`;


                document.body.appendChild(el);


                setTimeout(() => { try { el.remove(); } catch(e) {} }, 800);


            }





            updateStats();





            // 记录已配对的英文单词（不是卡面文字）


            const enWord = first.dataset.type === 'en' ? first.dataset.text : second.dataset.text;


            G.matchedSet.add(enWord);





            // 延迟隐藏卡片


            setTimeout(() => {


                first.classList.add('hidden');


                second.classList.add('hidden');


            }, 400);





            // 检查是否完成本轮


            if (G.matchedPairs === G.totalPairs) {


                setTimeout(() => {


                    sound.playSound('match');


                    nextRound();


                }, 600);


            }


        }





        function onMismatch(first, second) {


            sound.playSound('wrong');


            first.classList.add('wrong');


            second.classList.add('wrong');





            const word = first.dataset.type === 'en' ? first.dataset.text : second.dataset.text;


            G.wrongWords.set(word, (G.wrongWords.get(word) || 0) + 1);


            // 限制 wrongWords 大小，防止内存泄漏


            if (G.wrongWords.size > 50) {


                const firstKey = G.wrongWords.keys().next().value;


                G.wrongWords.delete(firstKey);


            }


            G.wrong++;


            G.combo = 0;


            G.score -= 1; // 做错-1分





            setHint(wrongMessages[Math.floor(Math.random() * wrongMessages.length)]);


            updateStats();





            setTimeout(() => {


                first.classList.remove('selected', 'wrong');


                second.classList.remove('wrong');


                G.selectedCard = null;


            }, 400);


        }





        function showVictory() {


            const acc = G.correct + G.wrong > 0


                ? Math.round(G.correct / (G.correct + G.wrong) * 100) : 0;


            const el = document.createElement('div');


            el.className = 'encouragement';


            el.innerHTML = `🎉 恭喜通关！🎉<br><span style="font-size:0.85rem">得分:${G.score} 正确:${G.correct} 错误:${G.wrong} 正确率:${acc}%</span>`;


            document.body.appendChild(el);


            setTimeout(() => { try { el.remove(); } catch(e) {} }, 3000);


        }





        function spawnStars(el) {


            // 安全检查：确保元素存在且在DOM中


            if (!el || !el.isConnected || !el.getBoundingClientRect) return;


            try {


                const r = el.getBoundingClientRect();


                if (!r.width || !r.height) return;


                


                const stars = ['⭐','✨','💫'];


                // 只生成2个星星


                for (let i = 0; i < 2; i++) {


                    const s = document.createElement('div');


                    s.className = 'star';


                    s.textContent = stars[i % stars.length];


                    s.style.left = (r.left + r.width/2 + (i - 0.5) * 30) + 'px';


                    s.style.top = (r.top + r.height/2 + (Math.random() - 0.5) * 30) + 'px';


                    s.style.fontSize = '14px';


                    document.body.appendChild(s);


                    setTimeout(() => { 


                        try { 


                            if (s.isConnected) s.remove(); 


                        } catch(e) {} 


                    }, 600);


                }


            } catch(e) {


                console.warn('spawnStars error:', e);


            }


        }





        function setHint(text) { document.getElementById('hint').textContent = text; }





        function updateStats() {


            document.getElementById('score').textContent = G.score;


            document.getElementById('correct').textContent = G.correct;


            document.getElementById('wrong').textContent = G.wrong;


            document.getElementById('matched').textContent = G.matchedPairs;


            const pct = (G.matchedPairs / G.totalPairs) * 100;


            document.getElementById('progressFill').style.width = pct + '%';


        }





        document.addEventListener('DOMContentLoaded', init);





        // PWA


        if ('serviceWorker' in navigator) {


            window.addEventListener('load', () => {


                navigator.serviceWorker.register('service-worker.js')


                    .then(r => console.log('SW OK'))


                    .catch(e => console.warn('SW fail', e));


            });


        }


    })();


    


    </script>


</body>
